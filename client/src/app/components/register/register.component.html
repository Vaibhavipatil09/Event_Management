
<link
  href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
  rel="stylesheet"
/>

<div class="container d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card shadow-sm p-4" style="width: 100%; max-width: 430px;">

    <h3 class="text-center mb-4">Register</h3>

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input
        class="form-control"
        [(ngModel)]="user.username"
        placeholder="Enter username"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input
        class="form-control"
        type="email"
        [(ngModel)]="user.email"
        placeholder="Enter email"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input
        type="password"
        class="form-control"
        [(ngModel)]="user.password"
        placeholder="Enter password"
      />
    </div>

    <div class="mb-4">
      <label class="form-label">Role</label>
      <select class="form-select" [(ngModel)]="user.role">
        <option value="PLANNER">Planner</option>
        <option value="CLIENT">Client</option>
        <option value="STAFF">Staff</option>
      </select>
    </div>

    <div class="d-grid">
      <button class="btn btn-success" (click)="register()">
        Register
      </button>
    </div>

    <div class="text-center mt-3">
      <span class="text-muted">Already have an account?</span>
      <a routerLink="/login" class="fw-semibold text-decoration-none ms-1">
        Login here
      </a>
    </div>

  </div>
</div>
