<!-- navbar.component.html -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&display=swap"
  rel="stylesheet" />

<nav class="ev-nav">
  <div class="ev-nav-inner container-fluid px-3 px-lg-4">

    <!-- LOGO -->
    <a class="ev-brand" routerLink="/home">
      <div class="ev-gem"><i class="bi bi-stars"></i></div>
      <span class="ev-brand-name">Eventora</span>
    </a>

    <!-- DESKTOP LINKS -->
    <ul class="ev-nav-links d-none d-lg-flex">
      <li><a (click)="scrollToTop()" class="nav-link-item">Home</a></li>
      <li><a (click)="scrollToSection('services')" class="nav-link-item">Services</a></li>
      <ng-container *ngIf="isLoggedIn && role==='PLANNER'">
        <li><a routerLink="/planner-dashboard" routerLinkActive="ev-active" class="nav-link-item">Dashboard</a></li>
      </ng-container>
      <ng-container *ngIf="isLoggedIn && role==='STAFF'">
        <li><a routerLink="/staff-dashboard" routerLinkActive="ev-active" class="nav-link-item">My Tasks</a></li>
      </ng-container>
      <ng-container *ngIf="isLoggedIn && role==='CLIENT'">
        <li><a routerLink="/client-dashboard" routerLinkActive="ev-active" class="nav-link-item">My Events</a></li>
      </ng-container>
      <li><a (click)="scrollToSection('contact')" class="nav-link-item">Contact Us</a></li>
    </ul>

    <!-- RIGHT -->
    <div class="ev-nav-right">
      <!-- Theme toggle -->
      <button class="ev-icon-btn" (click)="toggleTheme()" [title]="isDark ? 'Switch to Light' : 'Switch to Dark'">
        <i class="bi" [ngClass]="isDark ? 'bi-sun-fill' : 'bi-moon-fill'"></i>
      </button>

      <ng-container *ngIf="isLoggedIn; else guestNav">
        <span class="ev-role-badge">
          <i class="bi bi-person-badge-fill"></i>&nbsp;{{role}}
        </span>
        <button class="ev-logout-btn" (click)="logout()">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </button>
      </ng-container>

      <ng-template #guestNav>
        <a routerLink="/login" class="ev-outline-btn">Sign In</a>
        <a routerLink="/register" class="ev-solid-btn">Get Started</a>
      </ng-template>

      <!-- Mobile hamburger -->
      <button class="ev-icon-btn d-lg-none" type="button" data-bs-toggle="collapse" data-bs-target="#evMobileMenu">
        <i class="bi bi-list"></i>
      </button>
    </div>
  </div>

  <!-- MOBILE MENU -->
  <div class="collapse" id="evMobileMenu">
    <div class="ev-mobile-menu">
      <a (click)="scrollToTop()" class="ev-mob-link">🏠 Home</a>
      <a (click)="scrollToSection('services')" class="ev-mob-link">✨ Services</a>
      <ng-container *ngIf="isLoggedIn && role==='PLANNER'">
        <a routerLink="/planner-dashboard" class="ev-mob-link">🎉 Planner Dashboard</a>
      </ng-container>
      <ng-container *ngIf="isLoggedIn && role==='STAFF'">
        <a routerLink="/staff-dashboard" class="ev-mob-link">🗂️ My Tasks</a>
      </ng-container>
      <ng-container *ngIf="isLoggedIn && role==='CLIENT'">
        <a routerLink="/client-dashboard" class="ev-mob-link">🎫 My Events</a>
      </ng-container>
      <a (click)="scrollToSection('contact')" class="ev-mob-link">📞 Contact Us</a>
      <ng-container *ngIf="!isLoggedIn">
        <a routerLink="/login" class="ev-mob-link">Sign In</a>
        <a routerLink="/register" class="ev-mob-link">Register</a>
      </ng-container>
      <ng-container *ngIf="isLoggedIn">
        <button class="ev-mob-link ev-mob-logout" (click)="logout()">⎋ Logout</button>
      </ng-container>
    </div>
  </div>
</nav>

<style>
  :root {
    --pri: #6C63FF;
    --acc: #F59E0B;
    --fh: 'Syne', sans-serif;
    --fb: 'Inter', sans-serif;
  }

  .ev-nav {
    background: rgba(20, 12, 50, .92);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255, 255, 255, .08);
    position: sticky;
    top: 0;
    z-index: 1050;
    box-shadow: 0 4px 20px rgba(0, 0, 0, .25);
    transition: background .3s;
  }

  .ev-nav-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 11px;
    padding-bottom: 11px;
    gap: 20px;
  }

  .ev-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .ev-gem {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #F59E0B, #F472B6);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 17px;
    color: #fff;
    box-shadow: 0 3px 12px rgba(245, 158, 11, .4);
    flex-shrink: 0;
  }

  .ev-brand-name {
    font-family: var(--fh);
    font-size: 1.35rem;
    font-weight: 800;
    background: linear-gradient(90deg, #F59E0B, #F472B6, #A78BFA);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .ev-nav-links {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 2px;
    flex: 1;
    justify-content: center;
  }

  /* ✅ nav-link-item — cursor pointer + same styling as routerLink anchors */
  .nav-link-item {
    color: rgba(255, 255, 255, .7);
    text-decoration: none;
    font-size: .875rem;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 8px;
    transition: all .18s;
    display: block;
    cursor: pointer;
  }

  .nav-link-item:hover,
  .ev-active {
    color: #fff !important;
    background: rgba(108, 99, 255, .25);
  }

  .ev-nav-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .ev-icon-btn {
    width: 36px;
    height: 36px;
    background: rgba(255, 255, 255, .1);
    border: 1px solid rgba(255, 255, 255, .15);
    border-radius: 50%;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: .95rem;
    transition: all .18s;
  }

  .ev-icon-btn:hover {
    background: rgba(108, 99, 255, .3);
    transform: scale(1.08);
  }

  .ev-role-badge {
    background: rgba(245, 158, 11, .18);
    border: 1px solid rgba(245, 158, 11, .35);
    color: #FCD34D;
    padding: 5px 13px;
    border-radius: 20px;
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .ev-logout-btn {
    background: rgba(239, 68, 68, .15);
    border: 1px solid rgba(239, 68, 68, .3);
    color: #FCA5A5;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: .82rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .18s;
    font-family: var(--fb);
    display: flex;
    align-items: center;
  }

  .ev-logout-btn:hover {
    background: rgba(239, 68, 68, .28);
    color: #fff;
    transform: translateY(-1px);
  }

  .ev-outline-btn {
    border: 1.5px solid rgba(255, 255, 255, .3);
    color: rgba(255, 255, 255, .85);
    padding: 7px 18px;
    border-radius: 20px;
    font-size: .82rem;
    font-weight: 500;
    text-decoration: none;
    transition: all .18s;
    white-space: nowrap;
  }

  .ev-outline-btn:hover {
    border-color: #A78BFA;
    color: #fff;
  }

  .ev-solid-btn {
    background: linear-gradient(135deg, #6C63FF, #A78BFA);
    color: #fff;
    padding: 7px 18px;
    border-radius: 20px;
    font-size: .82rem;
    font-weight: 600;
    text-decoration: none;
    transition: all .2s;
    box-shadow: 0 3px 14px rgba(108, 99, 255, .35);
    white-space: nowrap;
  }

  .ev-solid-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(108, 99, 255, .5);
    color: #fff;
  }

  .ev-mobile-menu {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 10px 16px 16px;
    border-top: 1px solid rgba(255, 255, 255, .08);
    background: #1A103C;
  }

  .ev-mob-link {
    color: rgba(255, 255, 255, .75);
    text-decoration: none;
    font-size: .9rem;
    font-weight: 500;
    padding: 10px 14px;
    border-radius: 8px;
    transition: all .18s;
    display: block;
    cursor: pointer;
  }

  .ev-mob-link:hover {
    background: rgba(108, 99, 255, .2);
    color: #fff;
  }

  .ev-mob-logout {
    background: none;
    border: none;
    cursor: pointer;
    width: 100%;
    text-align: left;
    font-family: var(--fb);
    color: #FCA5A5 !important;
  }
</style>
