<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>PlannerApp</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- ✅ Bootstrap (KEEP SAME VERSION) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- ✅ Bootstrap Icons (NEW) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <!-- ✅ Google Fonts (NEW - Safe) -->
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <!-- ✅ Razorpay (KEEP) -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- ✅ Base path script (KEEP EXACTLY SAME) -->
  <script>
    (function () {
      var baseElement = document.querySelector('base');
      if (baseElement) {
        const pathname = window.location.pathname
        const match = pathname.match(/^(.*?\/5000\/)/);
        baseElement.setAttribute('href', match ? match[0] : '');
      }
    })();
  </script>

  <!-- ✅ GLOBAL STYLES (SAFE ADDITION) -->
  <style>
    :root {
      --primary: #6C63FF;
      --bg: #F5F3FF;
      --card: #ffffff;
      --text: #1A103C;
      --border: #929293;
      --font-head: 'Syne', sans-serif;
      --font-body: 'Inter', sans-serif;
    }

    html {
      scroll-behavior: smooth;
      /* ✅ smooth scrolling */
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
    }

    /* ✅ Scrollbar styling */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 4px;
    }

    /* ✅ Cards enhancement */
    .card {
      border-radius: 14px !important;
      border: 1px solid var(--border) !important;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(108, 99, 255, 0.15);
    }

    /* ✅ Buttons */
    .btn-primary {
      background: var(--primary);
      border: none;
    }

    .btn-primary:hover {
      background: #574fd6;
    }

    /* ✅ Dark mode (optional future use) */
    body.dark-mode {
      --bg: #0D0820;
      --card: #1A1035;
      --text: #EDE9FE;
      --border: rgba(108, 99, 255, 0.2);
    }
  </style>

</head>

<body>

  <app-root></app-root>

  <!-- ✅ Bootstrap JS (KEEP) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
